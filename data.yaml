# Multi-dataset registry — consumed by download_data.sh
# enabled: false → skipped by `./download_data.sh` with no args when there is no stable
# direct file URL (portals, sign-in, many files). See primary_url / alternate_urls.
#
# Each dataset needs: id, label, metadata, download.url
# Default path: {storage.root}/{dataset_prefix}/{label}__{suffix}
#   suffix = metadata.geo_accession if set, else dataset id
#
storage:
  root: /mnt/data
  dataset_prefix: tumor_niche
defaults:
  download:
    wget_extra_args: []
datasets:
  - id: GSE295862_xenium
    label: adipose_obesity_wl_xenium
    enabled: true
    metadata:
      title: Selective remodelling of the adipose niche in obesity and weight loss [Xenium]
      geo_accession: GSE295862
      geo_series_url: "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE295862"
      primary_url: "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE295862"
      alternate_urls:
        - "https://singlecell.broadinstitute.org/single_cell/study/SCP3117/selective-remodelling-of-the-adipose-niche-in-obesity-and-weight-loss-spatial#study-download"
      source_type: geo_and_scp
      platform: Xenium
      organism: Homo sapiens
      n_participants: 8
      n_samples: 12
      n_cells: 25795
      n_nuclei: null
      n_spots: null
      n_genes_panel: 428
      tissue: abdominal subcutaneous adipose tissue
      condition: obesity
      publication_doi: null
      overall_design: |
        Spatial transcriptomics was carried out in subcutaneous abdominal AT from 4 people with obesity before and after marked WL (paired samples), and in 4 healthy lean controls. All molecular phenotyping was carried out after overnight fast. AT samples were obtained intraoperatively from morbidly obese individuals (BMI>35kg/m2) undergoing laparoscopic bariatric surgery (gastric bypass or gastric sleeve) and healthy controls (BMI<26kg/m2) undergoing non-bariatric laparoscopic abdominal surgery. Subcutaneous AT was collected from abdominal surgical incision sites. Follow up subcutaneous AT samples were collected from the peri-umbilical region using needle biopsy at >5 months after weight loss intervention. Whole AT samples were snap frozen at collection and stored at -80C for future use. Participants were unrelated, between 20-70 years of age, from a multi-ethnic background, and free from systemic illnesses not related to obesity. People with treated T2D were excluded because of potential effects of hypoglycaemic medications on AT metabolism. All participants gave informed consent. The study complies with all relevant ethical regulations and was approved by the London – City Road and Hampstead Research Ethics Committee, United Kingdom (reference 13/LO/0477). The same study is available on the Single Cell Portal as SCP3117.
      summary: |
        Weight loss significantly improves metabolic and cardiovascular health in people with obesity. Adipose tissue remodelling is central to these varied and important clinical effects. However surprisingly little is known about the underlying mechanisms, presenting a barrier to treatment advances. Here we report a spatially resolved single nucleus atlas (171,247 cells, 70 people) investigating the cell types, molecular events and regulatory factors that reshape human adipose tissues, and thus metabolic health, in obesity and therapeutic weight loss. We discover selective vulnerability to senescence in metabolic, precursor and vascular cells and reveal senescence is potently reversed by weight loss. We define gene regulatory mechanisms and tissue signals that may drive a degenerative cycle of senescence, tissue injury and metabolic dysfunction. We find that weight loss reduces adipocyte hypertrophy and biomechanical constraint pathways, activating global metabolic flux and bioenergetic substrate cycles that may mediate systemic improvements in metabolic health. In the immune compartment, we demonstrate that weight loss represses obesity-induced macrophage infiltration but does not completely reverse activation, leaving these cells primed to trigger potential weight regain and worsen metabolic dysfunction. Throughout, we map cells to tissue niches to understand the collective determinants of tissue injury and recovery. Overall, our complementary single nucleus and spatial datasets offer unprecedented insights into the basis of obese adipose tissue dysfunction and its reversal by weight loss, and a key resource for mechanistic and therapeutic exploration.
      st_download_url: "https://singlecell.broadinstitute.org/single_cell/study/SCP3117/selective-remodelling-of-the-adipose-niche-in-obesity-and-weight-loss-spatial#study-download OR GEO https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE295862"
      paper_reference: Selective remodelling of the adipose niche in obesity and weight loss | Nature
      access_policy: Open access
      paired_he: 'No'
      access_notes: Immediate download
      n_tokens_estimate: 11040260
    download:
      url: "https://www.ncbi.nlm.nih.gov/geo/download/?acc=GSE295862&format=file"
      wget_extra_args: []
    storage: {}
