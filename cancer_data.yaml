        - ER-/HER2+/PR-

      preservation: FFPE

      n_genes_panel: ~300   # inferred (~313 targets from known dataset)

      overall_design: |
        Two FFPE human breast cancer samples were profiled using Xenium spatial transcriptomics.
        Sample 1 was profiled with two technical replicates, while Sample 2 was profiled once.
        Consecutive tissue sections were also used for Visium spatial transcriptomics and single-cell RNA-seq,
        enabling cross-modal integration across spatial and single-cell technologies.

      summary: |
        This dataset demonstrates integration of Xenium spatial transcriptomics with single-cell RNA-seq and Visium data
        to characterize tumor heterogeneity in breast cancer.
        It identifies distinct tumor subtypes, spatial cell neighborhoods, and rare boundary cell populations,
        highlighting the value of combining spatial and single-cell modalities.

