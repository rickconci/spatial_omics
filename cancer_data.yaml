  - id: GSE300147_xenium
    label: HNSCC_spatial_TCR_Xenium_McCord_2025
    enabled: false

    metadata:
      title: Xenium Spatial Transcriptomics of Head and Neck Single Cell Carcinoma
      geo_accession: GSE300147
      primary_url: "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE300147"

      platform: Xenium In Situ Analyzer (GPL33762)
      technology: Xenium spatial transcriptomics

      organism: Homo sapiens

      n_participants: 10
      n_samples: 18
      n_samples_tumor: 17
      n_samples_control: 1

      n_cells: null
      n_spots: null

      n_genes_panel: 477
      panel_design:
        base_panel: 377
        custom_probes: 100
        includes:
          - TCR_CDR3_probes
          - T_cell_markers
          - HPV_genes
          - tumor_markers

      tissue: Head and Neck Squamous Cell Carcinoma (HNSCC)
      condition: Cancer

      publication_doi: "10.1101/2025.08.06.668925"
      publication_status: preprint

      overall_design: |
        Ten fresh-frozen HNSCC tumors (including HPV+ and HPV- cases) and one ameloblastoma control tumor were profiled using Xenium spatial transcriptomics. 
        Seven tumors were processed in technical replicates, resulting in 17 HNSCC tumor sections. 
        A 377-gene Xenium panel was combined with 100 custom probes targeting TCR CDR3 sequences and additional immune and tumor genes. 
        This enabled single-cell resolution spatial profiling of gene expression and T cell clonotypes within intact tumor tissue.

      summary: |
        This dataset provides single-cell resolution spatial transcriptomics of HNSCC tumors using Xenium, including custom probes targeting TCR CDR3 regions. 
        The data enables spatial mapping of T cell clones within tumors and characterization of their local microenvironment. 
        Technical replicates and inclusion of a non-HNSCC tumor control support analysis of spatial variability and specificity.

      has_spatial: true
      has_tcr: true
      tcr_type: targeted_spatial_probes
      has_single_cell: true

      st_resolution: single_cell
      paired_he: true

      access_policy: Open access
      access_notes: Large dataset (~47GB); includes H5, Parquet, and TIFF files

      bioproject: PRJNA1279130

      related_datasets:
        scRNA_seq: GSE287301
        pbmc_tcr_seq: GSE285951

      n_tokens_estimate: null

    download:
      url: "https://www.ncbi.nlm.nih.gov/geo/download/?acc=GSE300147&format=file"
      wget_extra_args: []

    storage: {}

  - id: GSE277080_spatial_touchstone
    label: Spatial_Touchstone_multiplatform_benchmark_2025
    enabled: false

    metadata:
      title: Standardized metrics for assessment and reproducibility of imaging-based spatial transcriptomics datasets
      geo_accession: GSE277080
      primary_url: "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE277080"

      publication_doi: "10.1038/s41587-025-02811-9"
      publication_status: published

      platforms:
        - Xenium (GPL33762)
        - CosMx SMI (GPL33484)

      modalities:
        - spatial_transcriptomics
        - spatial_proteomics
        - snRNA_seq

      organism: Homo sapiens

      n_samples: 38   # GEO samples (scans)
      n_assays_total: 76   # ST dataset assays (from paper)
      n_profiles_total: 203   # combined ST + public profiles (paper summary)

      n_cells_total: 8000000   # ST dataset approx  [oai_citation:1‡Plummer et al. - 2025 - Standardized metrics for assessment and reproducibility of imaging-based spatial transcriptomics dat.pdf](sediment://file_00000000924471f88d19b91a6e5ef250)
      n_cells_portal: 33000000   # full STP scale

      tissues:
        - appendix
        - colon
        - pancreas
        - ileum
        - breast_cancer
        - prostate_cancer

      condition:
        - normal
        - cancer

      n_genes_panel:
        Xenium:
          - 377   # multi-tissue panel
          - 380   # breast panel
        CosMx:
          - 950 + 50 add-on
        Protein_panel:
          - 64

      overall_design: |
        The Spatial Touchstone (ST) project is a multi-site, multi-platform benchmarking study designed to evaluate reproducibility and performance of imaging-based spatial transcriptomics technologies.
        Formalin-fixed paraffin-embedded (FFPE) tissues from six tissue types (normal and cancer) were profiled across multiple institutions using Xenium and CosMx platforms with standardized operating procedures (STSOPs).
        Serial sections were processed across sites to assess inter-site and intra-site reproducibility.
        Matched snRNA-seq (snPATHO-seq) data were generated as a reference for evaluating transcriptional accuracy and cell type annotation.
        Spatial proteomics (CosMx protein panel) was also performed for multi-omic integration.

      summary: |
        This dataset provides a standardized benchmarking resource for imaging-based spatial transcriptomics.
        It introduces quantitative metrics for evaluating data quality, including sensitivity, signal-to-noise ratio, dynamic range, sparsity, entropy, and segmentation accuracy.
        The Spatial Touchstone dataset demonstrates high reproducibility across platforms and sites and establishes standardized protocols and computational tools (SpatialQM) for cross-platform comparison.
        The associated Spatial Touchstone Portal integrates over 200 spatial profiles, enabling benchmarking against public datasets.

      has_spatial: true
      has_proteomics: true
      has_single_cell: true

      is_benchmark_dataset: true
      is_multiplatform: true
      is_multisite: true

      st_resolution: single_cell

      paired_he: true

      access_policy: Open access
      access_notes: Large dataset (~206GB); includes CSV and image data

      bioproject: PRJNA1160328

      associated_resource:
        portal: "https://www.spatialtouchstone.org"
        software: "https://github.com/Center-for-Spatial-OMICs/SpatialQM"

      n_tokens_estimate: null

    download:
      url: "https://www.ncbi.nlm.nih.gov/geo/download/?acc=GSE277080&format=file"
      wget_extra_args: []

    storage: {}


  - id: Cervilla2026_xenium_benchmark
    label: Xenium_MT_vs_5K_multicancer_benchmark
    enabled: false

    metadata:
      title: A technical comparison of spatial transcriptomics platforms across six cancer types
      primary_url: "https://doi.org/10.1186/s13059-026-03937-y"

      publication_doi: "10.1186/s13059-026-03937-y"
      publication_status: published

      platforms:
        - Xenium (MT panel)
        - Xenium Prime (5K panel)

      modalities:
        - spatial_transcriptomics

      organism: Homo sapiens

      dataset_type: benchmark
      is_multiplatform: true
      is_same_sample_comparison: true

      n_participants: 6
      n_samples: 6   # one tumor per cancer type

      tissues:
        - breast_cancer
        - colorectal_cancer
        - lung_cancer
        - lymphoma
        - ovarian_cancer
        - bladder_cancer

      condition: cancer

      n_cells:
        xenium_total: 5809890   # approx from paper
        cosmx_total: 667916     # for reference

      panel_types:
        xenium_mt:
          genes: 377
        xenium_5k:
          genes: 5000

      data_structure:
        axes:
          - cancer_type
          - panel_type

        panel_types:
          - xeniumMT
          - xenium5K

        cancer_types:
          - breast
          - colorectal
          - lung
          - lymphoma
          - ovarian

      overall_design: |
        Six FFPE tumor samples (one per cancer type) were serially sectioned and profiled across multiple spatial transcriptomics platforms.
        Xenium data was generated using both the 377-gene multi-tissue panel (XeniumMT) and the 5000-gene Xenium Prime panel (Xenium5K).
        Consecutive tissue sections were used to enable direct comparison between platforms and gene panels while controlling for biological variability.
        Spatial data were aligned across platforms to compare transcript detection, spatial coherence, cell type composition, and gene-level concordance.

      summary: |
        This dataset provides a controlled benchmark comparing Xenium gene panels across multiple cancer types.
        It demonstrates a trade-off between gene coverage and per-gene sensitivity: larger panels (5K) increase transcriptome breadth but reduce detection efficiency per gene.
        The dataset enables analysis of how panel size affects spatial signal, cell type annotation, and downstream biological interpretation.

      has_spatial: true
      has_single_cell: true

      st_resolution: single_cell
      paired_he: true

      key_features:
        - same_sample_cross_platform
        - panel_size_comparison
        - spatial_alignment_across_modalities

      access_policy: Open access
      access_notes: Zenodo-hosted dataset; multiple zip archives per cancer and panel

      n_tokens_estimate: null

    download:
      url: https://zenodo.org/api/records/18000256/files-archive
      files:
        - xenium5K_Breast.zip
        - xenium5K_Colorectal.zip
        - xenium5K_Lung.zip
        - xenium5K_Lymphoma.zip
        - xenium5K_Ovarian.zip
        - xeniumMT_Breast.zip
        - xeniumMT_Colorectal.zip
        - xeniumMT_Lung.zip
        - xeniumMT_Lymphoma.zip
        - xeniumMT_Ovarian.zip

    storage: {}

