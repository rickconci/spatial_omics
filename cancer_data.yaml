    metadata:
      title: Characterization of immune cell populations in the tumor microenvironment of colorectal cancer using high definition spatial profiling [Xenium]
      geo_accession: GSE280314   # NOTE: Xenium files reference 280314
      primary_url: "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE280634"

      publication_doi: "10.1038/s41588-025-01735-x"
      publication_status: published

      platform: Xenium In Situ Analyzer (GPL33762)
      modalities:
        - spatial_transcriptomics

      organism: Homo sapiens

      n_participants: 3
      n_samples: 3

      tissue: colorectal_cancer
      condition: cancer

      preservation: FFPE

      n_genes_panel: ~420
      panel_design:
        base_panel: 322   # colon panel
        custom_add_on: 100
        includes:
          - TME_markers
          - immune_markers
          - fibroblast_markers
          - TCR_clonotype_probes

      key_feature_note: |
        Includes custom probes targeting TCR clonotypes, enabling spatial localization of clonally expanded T cells.

      overall_design: |
        Three human colorectal cancer samples were profiled using Xenium spatial transcriptomics with a colon-specific gene panel supplemented by custom genes.
        Serial sections were used alongside Visium HD and single-cell immune profiling to build an integrated atlas.
        The study focuses on spatial organization of immune populations, including macrophage subtypes and clonally expanded T cells.

      summary: |
        This dataset characterizes immune cell populations in the colorectal cancer tumor microenvironment using spatial transcriptomics.
        It identifies spatially distinct macrophage subpopulations and localizes clonally expanded T cells within the tumor.
        Integration with single-cell and Visium HD data enables detailed mapping of immune niches at the tumor periphery.

