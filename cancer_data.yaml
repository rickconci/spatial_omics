      has_targeted_tcr: true

      dataset_type: cohort_spatial
      subtype: immune_targeted_spatial

      st_resolution: single_cell
      paired_he: true

      biological_focus:
        - tumor_microenvironment
        - immune_cells
        - macrophages
        - T_cells
        - clonality

