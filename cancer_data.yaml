      overall_design: |
        Eight independent treatment-naive human PDAC tumors were profiled using Xenium spatial transcriptomics.
        A 280-gene predesigned breast cell typing panel was used to characterize spatial organization of tumor and stromal cells.
        The study focuses on the spatial positioning of cancer-associated fibroblasts (CAFs) relative to vasculature.

      summary: |
        This dataset investigates spatial metabolic interactions in the PDAC tumor microenvironment,
        showing that cancer-associated fibroblasts are positioned closer to vasculature and may support tumor cells via lipid metabolism.
        Spatial transcriptomics reveals microenvironmental organization relevant to tumor survival under hypoxia.

